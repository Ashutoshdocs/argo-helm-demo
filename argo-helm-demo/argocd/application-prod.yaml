apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:

  name: student-dev

  namespace: argocd

spec:

  project: default

  source:

    repoURL: https://github.com/YOUR_GITHUB/argo-helm-demo.git

    targetRevision: HEAD

    path: charts/student-app

    helm:

      valueFiles:

      - values-prod.yaml

  destination:

    server: https://kubernetes.default.svc

    namespace: prod

  syncPolicy:

    automated:

      prune: true

      selfHeal: true

    syncOptions:

    - CreateNamespace=true
